name: anispin
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Fonts
  google_fonts: ^6.3.0

  # SVG Icons
  flutter_svg: ^2.2.0

  # Animations
  lottie: ^3.3.1
  animated_text_kit: ^4.2.3
  animations: ^2.0.11
  flutter_animate: ^4.5.2

  # GraphQL (AniList API)
  graphql_flutter: ^5.2.0

  # Connectivity + reachability probe (global network error handling)
  connectivity_plus: ^6.1.0
  http: ^1.2.2

  # Network Images
  cached_network_image: ^3.4.1

  # Local Database (Sprint 8)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  video_player: ^2.8.6
  wakelock_plus: ^1.1.4
  crypto: ^3.0.3  # Added for SHA256 hashing

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Isar Code Generation
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/sounds/