name: anispin
description: "A modern Anime & Manga streaming and discovery platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^16.0.0

  # Fonts
  google_fonts: ^6.3.0

  # Animations
  flutter_animate: ^4.5.2

  # GraphQL (AniList API)
  graphql_flutter: ^5.2.0

  # Connectivity + reachability probe (global network error handling)
  connectivity_plus: ^6.1.0
  http: ^1.2.2

  # Network Images
  cached_network_image: ^3.4.1

  # Web, File, and URL Utilities
  webview_flutter: ^4.4.2
  url_launcher: ^6.2.0
  file_picker: ^8.0.0
  xml: ^6.3.0

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  path: ^1.9.1
  video_player: ^2.8.6
  wakelock_plus: ^1.1.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Isar Code Generation
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#08031A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#0B0B1E"
    theme_color: "#7C4DFF"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/